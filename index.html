<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>面試排程系統</title><style>:root{--primary:#185FA5;--primary-light:#E6F1FB;--primary-dark:#0C447C;--success:#0F6E56;--success-light:#E1F5EE;--danger:#993C1D;--danger-light:#FAECE7;--warn:#854F0B;--warn-light:#FAEEDA;--gray:#5F5E5A;--gray-light:#F1EFE8;--gray-bd:#D3D1C7;--text:#2C2C2A;--text-s:#5F5E5A;--bg:#fff;--bg2:#F8F7F4;--r:10px;}*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,sans-serif;background:var(--bg2);color:var(--text);font-size:15px;}nav{background:var(--bg);border-bottom:1px solid var(--gray-bd);padding:0 24px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}nav .logo{font-weight:600;font-size:16px;color:var(--primary-dark);padding:14px 0;margin-right:24px;}nav button{background:none;border:none;padding:16px 18px;font-size:14px;color:var(--text-s);cursor:pointer;border-bottom:3px solid transparent;}nav button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500;}.page{display:none;max-width:900px;margin:32px auto;padding:0 16px 60px;}.page.active{display:block;}.card{background:var(--bg);border-radius:var(--r);border:1px solid var(--gray-bd);padding:24px;margin-bottom:20px;}.card h2{font-size:17px;font-weight:600;margin-bottom:4px;}.card .sub{font-size:13px;color:var(--text-s);margin-bottom:20px;}label.lbl{font-size:13px;color:var(--text-s);display:block;margin-bottom:6px;}input[type=text],input[type=date],input[type=time],input[type=email]{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--gray-bd);font-size:14px;color:var(--text);background:var(--bg);outline:none;}input:focus{border-color:var(--primary);}.row{display:flex;gap:12px;flex-wrap:wrap;}.row .field{flex:1 1 140px;}.btn{padding:10px 22px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;}.btn-primary{background:var(--primary);color:#fff;}.btn-primary:disabled{background:var(--gray-bd);cursor:not-allowed;}.btn-secondary{background:var(--gray-light);color:var(--text);}</style></head><body><nav><div class="logo">面試排程</div><button class="active" onclick="showPage('fill')">填寫可用時間</button><button onclick="showPage('query')">查詢空檔</button></nav><div id="page-fill" class="page active"><div class="card" id="step-identity"><h2>請輸入你的資訊</h2><p class="sub">確認身份後，系統會自動比對你的 Google Calendar</p><div class="row" style="margin-bottom:12px;"><div class="field"><label class="lbl">你的 Email</label><input type="email" id="inp-email" placeholder="yourname@yile.com.tw"></div></div><label class="lbl">選擇你的名字</label><div class="member-chips" id="member-chips"></div><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px;"><input type="text" id="custom-name" placeholder="或直接輸入姓名" style="max-width:200px;"><button class="btn btn-primary" id="confirm-btn" onclick="selectMember()">確認並載入行事曆</button></div><p id="id-err" style="font-size:13px;color:var(--danger);margin-top:8px;"></p></div></div><div id="page-query" class="page"><div class="card"><h2>查詢委員空檔</h2><p class="sub">輸入時段立即查看誰有空</p><div class="row" style="align-items:flex-end;"><div class="field"><label class="lbl">日期</label><input type="date" id="q-date"></div><div class="field"><label class="lbl">開始</label><input type="time" id="q-start" value="09:00"></div><div class="field"><label class="lbl">結束</label><input type="time" id="q-end" value="10:00"></div><div style="flex:0 0 auto;padding-top:20px;"><button class="btn btn-primary" onclick="querySlot()">查詢</button></div></div></div><div id="query-result"></div></div><div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;"></div><script>var API_URL="https://script.google.com/a/macros/yile.com.tw/s/AKfycbyED5zXIBis9oUyx3nRwK4Pej0hfBLJJByBkEkpFHgrfNBkZtNOkPIebGuaeodwdO2H/exec";var MEMBERS=[{name:"張義宏",email:"chuckchang@yile.com.tw"},{name:"姚閔智",email:"timyao@yile.com.tw"},{name:"蕭詠耀",email:"yisonhsiao@yile.com.tw"},{name:"王巧聆",email:"charlenewang@yile.com.tw"},{name:"藍翊軒",email:"ericlan@yile.com.tw"},{name:"吳家榮",email:"stukawu@yile.com.tw"},{name:"卓緯倫",email:"wlcho@yile.com.tw"},{name:"邱于芳",email:"matildaciou@yile.com.tw"},{name:"陳立恩",email:"samchen@yile.com.tw"},{name:"林志澤",email:"jetlin@yile.com.tw"},{name:"葉耀升",email:"terryyeh@yile.com.tw"},{name:"吳梓煊",email:"meziwu@yile.com.tw"},{name:"董維誠",email:"jasontung@yile.com.tw"},{name:"徐千雅",email:"normashiu@yile.com.tw"},{name:"林志憲",email:"samuellin@yile.com.tw"},{name:"陳思銘",email:"joechen@yile.com.tw"},{name:"朱哲緯",email:"sadochu@yile.com.tw"},{name:"劉浩閔",email:"alomarliu@yile.com.tw"},{name:"喬貞朋",email:"mayachiao@yile.com.tw"},{name:"洪瀛華",email:"blackteahong@yile.com.tw"},{name:"王佑哲",email:"arieswang@yile.com.tw"},{name:"曾建穎",email:"brucetseng@yile.com.tw"},{name:"朱泓達",email:"jimchu@yile.com.tw"},{name:"張容溱",email:"cherryzhang@yile.com.tw"},{name:"吳函融",email:"hanrongwu@yile.com.tw"},{name:"潘紫涵",email:"alicepan@yile.com.tw"},{name:"陳漢章",email:"hertzchen@yile.com.tw"},{name:"莊文緯",email:"rexchuang@yile.com.tw"},{name:"黃士欣",email:"timhuang@yile.com.tw"}];function showPage(p){document.querySelectorAll(".page").forEach(function(e){e.classList.remove("active");});document.querySelectorAll("nav button").forEach(function(b){b.classList.remove("active");});document.getElementById("page-"+p).classList.add("active");var btns=document.querySelectorAll("nav button");if(p==="fill")btns[0].classList.add("active");else{btns[1].classList.add("active");}}function initChips(){var w=document.getElementById("member-chips");w.innerHTML=MEMBERS.map(function(m){return'<div style="padding:5px 14px;border-radius:20px;font-size:13px;border:1.5px solid #D3D1C7;background:#fff;cursor:pointer;display:inline-block;margin:4px;" data-name="'+m.name+'" data-email="'+m.email+'" onclick="chipClick(this)">'+m.name+'</div>';}).join("");}function chipClick(el){document.querySelectorAll("[data-name]").forEach(function(c){c.style.borderColor="#D3D1C7";c.style.color="#2C2C2A";});el.style.borderColor="#185FA5";el.style.color="#185FA5";document.getElementById("inp-email").value=el.dataset.email;}async function selectMember(){alert("功能已載入！請升級到完整版本。");}function querySlot(){alert("查詢功能！");}initChips();</script></body></html>
