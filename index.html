<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>面試排程系統</title>
<style>
:root{--primary:#185FA5;--primary-light:#E6F1FB;--primary-dark:#0C447C;--success:#0F6E56;--success-light:#E1F5EE;--danger:#993C1D;--danger-light:#FAECE7;--gray:#5F5E5A;--gray-light:#F1EFE8;--gray-bd:#D3D1C7;--text:#2C2C2A;--text-s:#5F5E5A;--bg:#fff;--bg2:#F8F7F4;--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:var(--bg2);color:var(--text);font-size:15px;}
nav{background:var(--bg);border-bottom:1px solid var(--gray-bd);padding:0 24px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
nav .logo{font-weight:600;font-size:16px;color:var(--primary-dark);padding:14px 0;margin-right:24px;}
nav button{background:none;border:none;padding:16px 18px;font-size:14px;color:var(--text-s);cursor:pointer;border-bottom:3px solid transparent;}
nav button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500;}
.page{display:none;max-width:900px;margin:32px auto;padding:0 16px 60px;}
.page.active{display:block;}
.card{background:var(--bg);border-radius:var(--r);border:1px solid var(--gray-bd);padding:24px;margin-bottom:20px;}
.card h2{font-size:17px;font-weight:600;margin-bottom:4px;}
.card .sub{font-size:13px;color:var(--text-s);margin-bottom:20px;}
label.lbl{font-size:13px;color:var(--text-s);display:block;margin-bottom:6px;}
input[type=text],input[type=date],input[type=time],input[type=email]{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--gray-bd);font-size:14px;color:var(--text);background:var(--bg);outline:none;}
input:focus{border-color:var(--primary);}
.row{display:flex;gap:12px;flex-wrap:wrap;}.row .field{flex:1 1 140px;}
.btn{padding:10px 22px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;}
.btn-primary{background:var(--primary);color:#fff;}.btn-primary:disabled{background:var(--gray-bd);cursor:not-allowed;}
.btn-secondary{background:var(--gray-light);color:var(--text);}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.week-nav span{font-weight:500;min-width:160px;text-align:center;}
.week-nav button{background:var(--gray-light);border:none;border-radius:6px;padding:6px 14px;cursor:pointer;}
.grid-wrap{overflow-x:auto;}
.grid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px;min-width:500px;}
.day-head{text-align:center;padding:8px 4px;font-size:12px;font-weight:500;color:var(--text-s);background:var(--bg2);border-radius:6px;}
.day-head.today{color:var(--primary);font-weight:700;}
.time-label{font-size:11px;color:var(--text-s);text-align:right;padding-right:8px;line-height:30px;}
.slot{height:30px;border-radius:4px;cursor:pointer;border:1.5px solid var(--gray-bd);background:var(--bg);user-select:none;position:relative;}
.slot:hover:not(.past){border-color:var(--primary);background:var(--primary-light);}
.slot.selected{background:var(--primary);border-color:var(--primary);}
.slot.past{opacity:.3;cursor:not-allowed;}
.slot.outside{opacity:.15;cursor:not-allowed;background:var(--bg2);}
.member-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.chip{padding:5px 14px;border-radius:20px;font-size:13px;border:1.5px solid var(--gray-bd);background:var(--bg);cursor:pointer;}
.chip.me{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.pill{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;}
.pill.free{background:var(--success-light);color:var(--success);}
.pill.busy{background:var(--danger-light);color:var(--danger);}
.pill.unk{background:var(--gray-light);color:var(--gray);}
.name-grid{display:flex;flex-wrap:wrap;gap:8px;}
.name-tag{padding:6px 14px;border-radius:8px;font-size:14px;}
.name-tag.free{background:var(--success-light);color:#085041;}
.name-tag.busy{background:var(--danger-light);color:#4A1B0C;}
.name-tag.unk{background:var(--gray-light);color:var(--gray);}
.heatmap-grid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px;min-width:500px;}
.heat-cell{height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;}
.divider{border:none;border-top:1px solid var(--gray-bd);margin:20px 0;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:6px;background:var(--primary-light);color:var(--primary-dark);}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.status-bar{background:var(--primary-light);border:1px solid #B5D4F4;border-radius:8px;padding:10px 16px;font-size:13px;color:var(--primary-dark);margin-bottom:16px;}
</style>
</head>
<body>
<nav>
  <div class="logo">面試排程</div>
  <button class="active" onclick="showPage('fill')">填寫可用時間</button>
  <button onclick="showPage('query')">查詢空檔</button>
</nav>

<div id="page-fill" class="page active">
  <div class="card" id="step-identity">
    <h2>請輸入你的資訊</h2>
    <p class="sub">選擇名字並勾選你本週有空的時段</p>
    <div class="row" style="margin-bottom:12px;">
      <div class="field">
        <label class="lbl">你的 Email</label>
        <input type="email" id="inp-email" placeholder="yourname@yile.com.tw">
      </div>
    </div>
    <label class="lbl">選擇你的名字</label>
    <div class="member-chips" id="member-chips"></div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px;">
      <input type="text" id="custom-name" placeholder="或直接輸入姓名" style="max-width:200px;">
      <button class="btn btn-primary" id="confirm-btn" onclick="selectMember()">確認 →</button>
    </div>
    <p id="id-err" style="font-size:13px;color:var(--danger);margin-top:8px;"></p>
  </div>

  <div class="card" id="step-grid" style="display:none;">
    <h2>你好，<span id="greeting-name" style="color:var(--primary)"></span>！</h2>
    <p class="sub">點選有空的時段，完成後按「送出」</p>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">&#8249; 上週</button>
      <span id="week-label"></span>
      <button onclick="changeWeek(1)">下週 &#8250;</button>
    </div>
    <div class="grid-wrap"><div class="grid" id="fill-grid"></div></div>
    <hr class="divider">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="submit-btn" onclick="submitAvailability()">送出可用時間</button>
      <button class="btn btn-secondary" onclick="clearSelection()">清除選取</button>
      <span id="selected-count" style="font-size:13px;color:var(--text-s);"></span>
    </div>
    <p id="submit-msg" style="margin-top:10px;font-size:13px;"></p>
  </div>
</div>

<div id="page-query" class="page">
  <div class="card">
    <h2>查詢委員空檔</h2>
    <p class="sub">輸入想安排面試的時段，立即查看誰有空</p>
    <div class="row" style="align-items:flex-end;">
      <div class="field"><label class="lbl">日期</label><input type="date" id="q-date"></div>
      <div class="field"><label class="lbl">開始</label><input type="time" id="q-start" value="09:00"></div>
      <div class="field"><label class="lbl">結束</label><input type="time" id="q-end" value="10:00"></div>
      <div style="flex:0 0 auto;padding-top:20px;"><button class="btn btn-primary" onclick="querySlot()">查詢</button></div>
    </div>
  </div>
  <div id="query-result"></div>

  <div class="card">
    <h2>整週空檔熱力圖 <span class="badge" id="submitted-count"></span></h2>
    <p class="sub">顏色越深代表越多委員有空</p>
    <div class="week-nav">
      <button onclick="changeHeatWeek(-1)">&#8249; 上週</button>
      <span id="heat-week-label"></span>
      <button onclick="changeHeatWeek(1)">下週 &#8250;</button>
    </div>
    <div class="grid-wrap"><div id="heatmap"></div></div>
    <hr class="divider">
    <button class="btn btn-secondary" onclick="loadData()">&#8635; 重新整理</button>
  </div>

  <div class="card">
    <h2>回覆狀況</h2>
    <div id="submitted-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
var SHEET_ID = "1h_iYImx-NXnkItU8OlJYYbPEz5HflzLPRivam918AkQ";
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjGEOlKj_m4P2lOJHIp7QxxaZ_k69q3wagrxoNMA1npIrNGCgs2kPtBLX3yzqUbMgl/exec";

var MEMBERS=[
  {name:"張義宏",email:"chuckchang@yile.com.tw"},{name:"姚閔智",email:"timyao@yile.com.tw"},
  {name:"蕭詠耀",email:"yisonhsiao@yile.com.tw"},{name:"王巧聆",email:"charlenewang@yile.com.tw"},
  {name:"藍翊軒",email:"ericlan@yile.com.tw"},{name:"吳家榮",email:"stukawu@yile.com.tw"},
  {name:"卓緯倫",email:"wlcho@yile.com.tw"},{name:"邱于芳",email:"matildaciou@yile.com.tw"},
  {name:"陳立恩",email:"samchen@yile.com.tw"},{name:"林志澤",email:"jetlin@yile.com.tw"},
  {name:"葉耀升",email:"terryyeh@yile.com.tw"},{name:"吳梓煊",email:"meziwu@yile.com.tw"},
  {name:"董維誠",email:"jasontung@yile.com.tw"},{name:"徐千雅",email:"normashiu@yile.com.tw"},
  {name:"林志憲",email:"samuellin@yile.com.tw"},{name:"陳思銘",email:"joechen@yile.com.tw"},
  {name:"朱哲緯",email:"sadochu@yile.com.tw"},{name:"劉浩閔",email:"alomarliu@yile.com.tw"},
  {name:"喬貞朋",email:"mayachiao@yile.com.tw"},{name:"洪瀛華",email:"blackteahong@yile.com.tw"},
  {name:"王佑哲",email:"arieswang@yile.com.tw"},{name:"曾建穎",email:"brucetseng@yile.com.tw"},
  {name:"朱泓達",email:"jimchu@yile.com.tw"},{name:"張容溱",email:"cherryzhang@yile.com.tw"},
  {name:"吳函融",email:"hanrongwu@yile.com.tw"},{name:"潘紫涵",email:"alicepan@yile.com.tw"},
  {name:"陳漢章",email:"hertzchen@yile.com.tw"},{name:"莊文緯",email:"rexchuang@yile.com.tw"},
  {name:"黃士欣",email:"timhuang@yile.com.tw"}
];

var DAYS=["日","一","二","三","四","五","六"];
var settings={interview_start:"09:00",interview_end:"18:00",slot_duration:"30"};
var HOURS=[],currentUser=null,currentEmail=null;
var selectedSlots=new Set(),fillWeekOffset=0,heatWeekOffset=0,allData={};

function buildHours(){
  HOURS=[];
  var s=toMins(settings.interview_start),e=toMins(settings.interview_end),d=parseInt(settings.slot_duration)||30;
  for(var m=s;m<e;m+=d)HOURS.push(toTime(m));
}
function toMins(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function toTime(m){return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");}

// ── JSONP 讀取 ──────────────────────────────────────────
function jsonp(url, cb) {
  var cbName = "cb_" + Date.now();
  window[cbName] = function(data) {
    delete window[cbName];
    document.getElementById("s_" + cbName)?.remove();
    cb(null, data);
  };
  var s = document.createElement("script");
  s.id = "s_" + cbName;
  s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cbName;
  s.onerror = function() { cb(new Error("載入失敗"), null); };
  document.head.appendChild(s);
}

// ── Google Sheets CSV 讀取 ───────────────────────────────
function loadFromCSV(sheetName, cb) {
  var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + 
            "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(sheetName);
  fetch(url)
    .then(r => r.text())
    .then(csv => {
      var rows = parseCSV(csv);
      cb(null, rows);
    })
    .catch(e => cb(e, null));
}

function parseCSV(text) {
  var lines = text.trim().split("
");
  return lines.map(line => {
    var cells = [], current = "", inQuote = false;
    for (var i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQuote = !inQuote; }
      else if (line[i] === "," && !inQuote) { cells.push(current.trim()); current = ""; }
      else { current += line[i]; }
    }
    cells.push(current.trim());
    return cells;
  });
}

// ── 主要資料載入（用 CSV）──────────────────────────────
function loadData(cb) {
  loadFromCSV("availability", function(err, rows) {
    if (err) { toast("無法讀取資料：" + err.message); if(cb) cb(); return; }
    allData = {};
    if (rows.length > 1) {
      var headers = rows[0].map(h => h.replace(/"/g,''));
      for (var i = 1; i < rows.length; i++) {
        var row = rows[i];
        var email = row[0]?.replace(/"/g,'') || "";
        var name = row[1]?.replace(/"/g,'') || "";
        var slotsRaw = row[2]?.replace(/"/g,'') || "[]";
        if (!email) continue;
        try {
          allData[email] = { name: name, slots: new Set(JSON.parse(slotsRaw)) };
        } catch(e) {
          allData[email] = { name: name, slots: new Set() };
        }
      }
    }
    if (document.getElementById("page-query").classList.contains("active")) {
      renderHeatmap();
      renderSubmitted();
    }
    if (cb) cb();
  });
}

// ── 寫入用 JSONP（Apps Script GET 帶 saveAvailability）──
function saveData(email, name, slots, cb) {
  var url = SCRIPT_URL + "?action=saveAvailability" +
    "&email=" + encodeURIComponent(email) +
    "&name=" + encodeURIComponent(name) +
    "&slots=" + encodeURIComponent(JSON.stringify(slots));
  jsonp(url, function(err, data) {
    if (err || !data || !data.ok) {
      cb(new Error(data?.error || "儲存失敗"));
    } else {
      cb(null);
    }
  });
}

// ── 頁面切換 ───────────────────────────────────────────
function showPage(p) {
  document.querySelectorAll(".page").forEach(e => e.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
  var btns = document.querySelectorAll("nav button");
  if (p === "fill") btns[0].classList.add("active");
  else { btns[1].classList.add("active"); loadData(); }
}

// ── 委員選擇 ───────────────────────────────────────────
function initChips() {
  var w = document.getElementById("member-chips");
  w.innerHTML = MEMBERS.map(m =>
    '<div class="chip" data-name="'+m.name+'" data-email="'+m.email+'" onclick="chipClick(this)">'+m.name+'</div>'
  ).join("");
}

function chipClick(el) {
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("me"));
  el.classList.add("me");
  document.getElementById("inp-email").value = el.dataset.email;
  document.getElementById("custom-name").value = "";
}

function selectMember() {
  var active = document.querySelector(".chip.me");
  var cn = document.getElementById("custom-name").value.trim();
  var email = document.getElementById("inp-email").value.trim().toLowerCase();
  var name = active ? active.dataset.name : cn;
  var err = document.getElementById("id-err");
  if (!email) { err.textContent = "請輸入 Email"; return; }
  if (!email.includes("@")) { err.textContent = "Email 格式不正確"; return; }
  if (!name) { err.textContent = "請選擇或輸入姓名"; return; }
  err.textContent = "";
  currentUser = name;
  currentEmail = email;
  var btn = document.getElementById("confirm-btn");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>載入中...';
  loadData(function() {
    if (allData[email]) selectedSlots = new Set(allData[email].slots);
    else selectedSlots = new Set();
    document.getElementById("greeting-name").textContent = name;
    document.getElementById("step-identity").style.display = "none";
    document.getElementById("step-grid").style.display = "";
    btn.disabled = false; btn.textContent = "確認 →";
    fillWeekOffset = 0;
    renderFillGrid();
  });
}

// ── 週格 ───────────────────────────────────────────────
function changeWeek(d) { fillWeekOffset += d; renderFillGrid(); }

function renderFillGrid() {
  var dates = getWeekDates(fillWeekOffset);
  document.getElementById("week-label").textContent = weekLabel(dates);
  var grid = document.getElementById("fill-grid");
  grid.innerHTML = "";
  grid.appendChild(document.createElement("div"));
  dates.forEach(d => {
    var el = document.createElement("div");
    el.className = "day-head" + (isToday(d) ? " today" : "");
    el.textContent = DAYS[d.getDay()] + " " + fmtShort(d);
    grid.appendChild(el);
  });
  var allH = [];
  for (var m = 8*60; m < 19*60; m += (parseInt(settings.slot_duration)||30)) allH.push(toTime(m));
  allH.forEach(h => {
    var lbl = document.createElement("div");
    lbl.className = "time-label"; lbl.textContent = h;
    grid.appendChild(lbl);
    dates.forEach(d => {
      var key = fmt(d)+"|"+h;
      var past = isPast(d, h);
      var outside = isOutsideHours(h);
      var el = document.createElement("div");
      el.className = "slot" + (past?" past":"") + (outside?" outside":"") + (selectedSlots.has(key)?" selected":"");
      if (!past && !outside) {
        el.onclick = function() { toggleSlot(el, key); };
        el.onmouseenter = function(e) { if(e.buttons===1) toggleSlot(el, key, true); };
      }
      grid.appendChild(el);
    });
  });
  updateCount();
}

function isOutsideHours(h) {
  var m = toMins(h);
  return m < toMins(settings.interview_start) || m >= toMins(settings.interview_end);
}

function toggleSlot(el, key, fo) {
  if (fo && selectedSlots.has(key)) return;
  if (selectedSlots.has(key)) { selectedSlots.delete(key); el.classList.remove("selected"); }
  else { selectedSlots.add(key); el.classList.add("selected"); }
  updateCount();
}

function updateCount() {
  document.getElementById("selected-count").textContent =
    selectedSlots.size > 0 ? "已選 " + selectedSlots.size + " 個時段" : "";
}

function clearSelection() {
  selectedSlots.clear();
  document.querySelectorAll(".slot.selected").forEach(e => e.classList.remove("selected"));
  updateCount();
}

function submitAvailability() {
  if (selectedSlots.size === 0) { toast("請至少選一個時段"); return; }
  var btn = document.getElementById("submit-btn");
  var msg = document.getElementById("submit-msg");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>儲存中...';
  msg.textContent = "";
  saveData(currentEmail, currentUser, [...selectedSlots], function(err) {
    btn.disabled = false; btn.textContent = "送出可用時間";
    if (err) {
      msg.style.color = "var(--danger)";
      msg.textContent = "儲存失敗，請確認網路連線後重試。";
      toast("儲存失敗：" + err.message);
    } else {
      msg.style.color = "var(--success)";
      msg.textContent = "✓ 已成功儲存 " + selectedSlots.size + " 個時段！";
      toast("✓ 已儲存 " + currentUser + " 的可用時間");
    }
  });
}

// ── HR 查詢 ────────────────────────────────────────────
function querySlot() {
  var date = document.getElementById("q-date").value;
  var start = document.getElementById("q-start").value;
  var end = document.getElementById("q-end").value;
  if (!date||!start||!end) { toast("請填寫完整日期與時間"); return; }
  if (start >= end) { toast("結束時間須晚於開始時間"); return; }
  var qs = [], cur = start;
  while (cur < end) {
    qs.push(date+"|"+cur);
    var p = cur.split(":").map(Number);
    var nx = new Date(2000,0,1,p[0],p[1]+(parseInt(settings.slot_duration)||30));
    cur = String(nx.getHours()).padStart(2,"0")+":"+String(nx.getMinutes()).padStart(2,"0");
  }
  var free=[],busy=[],unk=[];
  MEMBERS.forEach(m => {
    if (!allData[m.email]) { unk.push(m.name); return; }
    if (qs.every(s => allData[m.email].slots.has(s))) free.push(m.name);
    else busy.push(m.name);
  });
  var wd = new Date(date).toLocaleDateString("zh-TW",{weekday:"short"});
  document.getElementById("query-result").innerHTML =
    '<div class="card"><h2>'+date+'（'+wd+'）'+start+' - '+end+'</h2><p class="sub">查詢結果</p>' +
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">' +
    '<span class="pill free">有空 '+free.length+' 人</span>' +
    '<span class="pill busy">有行程 '+busy.length+' 人</span>' +
    '<span class="pill unk">未回覆 '+unk.length+' 人</span></div>' +
    (free.length?'<div style="margin-bottom:14px;"><p style="font-size:14px;font-weight:600;color:var(--success);margin-bottom:8px;">有空的委員</p><div class="name-grid">'+free.map(n=>'<span class="name-tag free">'+n+'</span>').join("")+'</div></div>':"") +
    (busy.length?'<div style="margin-bottom:14px;"><p style="font-size:14px;font-weight:600;color:var(--danger);margin-bottom:8px;">有行程的委員</p><div class="name-grid">'+busy.map(n=>'<span class="name-tag busy">'+n+'</span>').join("")+'</div></div>':"") +
    (unk.length?'<div><p style="font-size:14px;font-weight:600;color:var(--gray);margin-bottom:8px;">尚未回覆</p><div class="name-grid">'+unk.map(n=>'<span class="name-tag unk">'+n+'</span>').join("")+'</div></div>':"") +
    '</div>';
}

function changeHeatWeek(d) { heatWeekOffset += d; renderHeatmap(); }

function renderHeatmap() {
  var dates = getWeekDates(heatWeekOffset);
  document.getElementById("heat-week-label").textContent = weekLabel(dates);
  var allSets = Object.values(allData).map(v => v.slots), total = allSets.length;
  var wrap = document.getElementById("heatmap");
  var grid = document.createElement("div");
  grid.className = "heatmap-grid"; grid.style.minWidth = "500px";
  grid.appendChild(document.createElement("div"));
  dates.forEach(d => {
    var el = document.createElement("div"); el.className = "day-head"+(isToday(d)?" today":"");
    el.style.fontSize = "12px"; el.textContent = DAYS[d.getDay()]+" "+fmtShort(d);
    grid.appendChild(el);
  });
  HOURS.forEach(h => {
    var lbl = document.createElement("div"); lbl.className = "time-label"; lbl.textContent = h;
    grid.appendChild(lbl);
    dates.forEach(d => {
      var key = fmt(d)+"|"+h;
      var count = allSets.filter(s => s.has(key)).length;
      var ratio = total > 0 ? count/total : 0;
      var el = document.createElement("div"); el.className = "heat-cell";
      el.style.background = ratio>0 ? "rgba(24,95,165,"+(0.12+ratio*0.88).toFixed(2)+")" : "var(--bg2)";
      el.style.color = ratio>0.5 ? "#fff" : (ratio>0 ? "var(--primary-dark)" : "transparent");
      el.textContent = count > 0 ? count : "";
      el.title = fmt(d)+" "+h+"："+count+"/"+total+" 人";
      grid.appendChild(el);
    });
  });
  wrap.innerHTML = ""; wrap.appendChild(grid);
}

function renderSubmitted() {
  var sub = MEMBERS.filter(m => allData[m.email]);
  var no = MEMBERS.filter(m => !allData[m.email]);
  document.getElementById("submitted-count").textContent = sub.length+"/"+MEMBERS.length+" 人已回覆";
  document.getElementById("submitted-list").innerHTML =
    '<div class="name-grid" style="margin-bottom:10px">'+
    sub.map(m=>'<span class="name-tag free">'+m.name+'</span>').join("")+'</div>'+
    (no.length?'<p style="font-size:13px;color:var(--text-s);margin-top:8px;">尚未回覆：'+no.map(m=>m.name).join("、")+'</p>':"");
}

// ── 工具函式 ───────────────────────────────────────────
function getWeekDates(o) {
  var now=new Date(), sun=new Date(now);
  sun.setDate(now.getDate()-now.getDay()+o*7);
  return Array.from({length:7},(_,i)=>{ var d=new Date(sun); d.setDate(sun.getDate()+i); return d; });
}
function fmt(d){return d.toISOString().split("T")[0];}
function fmtShort(d){return(d.getMonth()+1)+"/"+d.getDate();}
function isToday(d){return fmt(d)===fmt(new Date());}
function isPast(d,h){var now=new Date(),p=h.split(":").map(Number),s=new Date(d);s.setHours(p[0],p[1],0,0);return s<now;}
function weekLabel(dates){return fmtShort(dates[0])+" - "+fmtShort(dates[6]);}
var _tt;
function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),3000);}

buildHours();
initChips();
document.getElementById("q-date").value = fmt(new Date());
</script>
